<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>論理構造・国語理論</title>
  <style>
    body {
      font-family: "Yu Mincho", serif;
      max-width: 900px;
      margin: 50px auto;
      padding: 20px;
      line-height: 1.9;
    }

    h1 {
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    h2 {
      margin-top: 30px;
      border-left: 4px solid #333;
      padding-left: 10px;
    }

    .box {
      border: 1px solid #bbb;
      padding: 15px;
      margin-top: 10px;
    }

    .note {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>Ⅲ. 論理構造・国語理論</h1>

  <p class="note">
    小論文に必要な思考技術を体系化する。
  </p>

  <h2>1. 論理構造の基本</h2>
  <div class="box">
    主張は必ず「問題設定 → 分析 → 結論」の流れを持つ。<br>
    感情や印象は論証としては扱わない。
  </div>

  <h2>2. 抽象化</h2>
  <div class="box">
    個別事例から「共通構造」を取り出す操作。<br>
    例：SNSの不満 → 「評価構造への依存」
  </div>

  <h2>3. 反論処理</h2>
  <div class="box">
    予想される反対意見を先に構造化し、再配置することで論理の強度を上げる。
  </div>

  <h2>4. 接続表現</h2>
  <div class="box">
    「しかし」「したがって」「一方で」などは論理関係の明示装置である。
  </div>

</body>
</html>
